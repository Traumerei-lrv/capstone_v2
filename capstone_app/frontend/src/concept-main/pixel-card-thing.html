<!DOCTYPE html>
<html lang="en">
<head>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#eef1f7;
}

/* glow */
.card-wrap{
    position:relative;
}

.card-wrap::before{
    content:"";
    position:absolute;
    inset:-40px;
    background:radial-gradient(circle, rgba(120,180,255,0.35), transparent 70%);
    filter:blur(30px);
    animation:pulse 3s ease-in-out infinite;
    z-index:0;
}

/* frame */
.card{
    position:relative;
    width:340px;
    height:200px;
    border-radius:18px;

    background:url("txtr-metal.png");
    background-size:100% 100%;
    background-repeat:no-repeat;

    padding:10px; /* thickness adjustment */
    box-sizing:border-box;

    z-index:1;
}

/* card inner */
.card-inner{
    width:100%;
    height:100%;
    border-radius:12px;

    background:linear-gradient(145deg,#ffffff,#e9edf5);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.8),
        inset 0 -2px 6px rgba(0,0,0,0.05);
}

/* glow animation */
@keyframes pulse{
    0%,100%{
        transform:scale(1);
        opacity:0.5;
    }
    50%{
        transform:scale(1.05);
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="card-wrap">
    <div class="card">
        <div class="card-inner"></div>
    </div>
</div>

</body>
</html>
